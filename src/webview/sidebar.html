<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyPilot Dashboard</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1, #4f46e5);
            --accent-glow: 0 0 20px rgba(99, 102, 241, 0.4);
            --bg-dark: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --color-error: #ef4444;
            --color-error-bg: rgba(239, 68, 68, 0.1);
            --color-error-glow: 0 0 15px rgba(239, 68, 68, 0.35);
            --color-success: #10b981;
            --color-success-bg: rgba(16, 185, 129, 0.1);
            --color-success-glow: 0 0 15px rgba(16, 185, 129, 0.3);
            --color-warning: #f59e0b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-group h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(120deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-success);
            background: var(--color-success-bg);
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: var(--color-success-glow);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--color-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.25); opacity: 1; box-shadow: 0 0 8px var(--color-success); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* Screen States */
        .state-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .waiting-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            border: 1px dashed var(--card-border);
            border-radius: 12px;
            background: var(--card-bg);
            margin-top: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .waiting-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .waiting-state h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 6px 0;
            color: var(--text-main);
        }

        .waiting-state p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        /* Error Report Card */
        .error-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .badge-error {
            align-self: flex-start;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--color-error);
            background: var(--color-error-bg);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: var(--color-error-glow);
        }

        .card-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .card-val {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            word-break: break-all;
        }

        .code-snippet {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            overflow-x: auto;
            white-space: pre;
            color: #ff79c6;
            margin: 4px 0 0 0;
            max-height: 120px;
        }

        /* AI Fix Panel */
        .ai-panel {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.85));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--accent-glow);
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .ai-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-gradient);
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-avatar {
            font-size: 1.2rem;
        }

        .ai-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #a5b4fc;
        }

        .ai-explanation {
            font-size: 0.8rem;
            line-height: 1.45;
            color: #cbd5e1;
        }

        .fix-code-block {
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #0d1117;
        }

        .fix-code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161b22;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fix-code-content {
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #8ce8ff;
            overflow-x: auto;
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* Action Buttons */
        .btn-primary {
            background: var(--primary-gradient);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.45);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Thinking State Shimmer */
        .thinking-state {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 12px;
        }

        .thinking-row {
            height: 12px;
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite;
            border-radius: 4px;
        }

        .thinking-row.short { width: 60%; }
        .thinking-row.medium { width: 85%; }

        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-group">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22h20L12 2z" fill="url(#logo-grad)"/>
                <defs>
                    <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#818cf8"/>
                        <stop offset="1" stop-color="#4f46e5"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>CyPilot</h1>
        </div>
        <div class="server-status">
            <div class="status-dot"></div>
            <span>Active :3000</span>
        </div>
    </header>

    <div class="state-container" id="state-container">
        <!-- Default Waiting State -->
        <div class="waiting-state" id="waiting-state">
            <div class="waiting-icon">🛸</div>
            <h3>Waiting for Cypress</h3>
            <p>Run your Cypress tests. When a test fails or intercepts a request, details will automatically stream here.</p>
        </div>

        <!-- Dynamic Content (Error card and AI fix) goes here -->
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        // Notify extension that webview is ready to load last state
        vscode.postMessage({ type: 'webviewReady' });

        // Listen for messages from extension.ts
        window.addEventListener('message', event => {
            const message = event.data;

            if (message.command === 'showError') {
                renderErrorAndFix(message.data);
            }
        });

        function renderErrorAndFix(data) {
            const container = document.getElementById('state-container');
            container.innerHTML = ''; // Clear previous state

            // Create Error details card
            const errorCard = document.createElement('div');
            errorCard.className = 'error-card';

            const badgeText = data.type === 'network_intercept' ? 'Network Intercept' : 'Test Failure';
            const badgeClass = data.type === 'network_intercept' ? 'badge-error' : 'badge-error'; // could customize later

            let innerHtml = `
                <div class="badge-error" style="${data.type === 'network_intercept' ? 'color: var(--color-warning); background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); box-shadow: 0 0 10px rgba(245, 158, 11, 0.2)' : ''}">${badgeText}</div>
                <div class="card-row">
                    <div class="card-label">Spec File</div>
                    <div class="card-val">${data.specName || 'unknown'}</div>
                </div>
                <div class="card-row">
                    <div class="card-label">Target URL</div>
                    <div class="card-val">${data.url || 'unknown'}</div>
                </div>
            `;

            if (data.type === 'test_failure') {
                innerHtml += `
                    <div class="card-row">
                        <div class="card-label">Error Message</div>
                        <div class="card-val" style="color: #fda4af;">${data.message || 'No error message'}</div>
                    </div>
                `;
            } else if (data.type === 'network_intercept') {
                innerHtml += `
                    <div class="card-row">
                        <div class="card-label">Method & Status</div>
                        <div class="card-val" style="color: #fcd34d;">${data.method} - ${data.statusCode}</div>
                    </div>
                    <div class="card-row">
                        <div class="card-label">Response Body</div>
                        <pre class="code-snippet">${typeof data.responseBody === 'object' ? JSON.stringify(data.responseBody, null, 2) : data.responseBody}</pre>
                    </div>
                `;
            }

            errorCard.innerHTML = innerHtml;
            container.appendChild(errorCard);

            // If it is a test failure, show AI proposed fix (Step 4 / 5 mock)
            if (data.type === 'test_failure') {
                // Generate a mockup AI Analysis of the Cypress failure
                const aiPanel = document.createElement('div');
                aiPanel.className = 'ai-panel';

                // We mock AI's intelligence here. We check the error message to generate a relevant mock fix.
                let proposedFixCode = `cy.get('.btn-submit').should('be.visible').click();`;
                let explanation = `The locator <code>.btn-submit</code> was not found. This could be because the DOM was still loading. I suggest waiting for visibility or updating the locator to check for correct role attributes.`;

                if (data.message.includes('cy.visit') || data.message.includes('redirect')) {
                    proposedFixCode = `cy.url().should('include', '/dashboard');`;
                    explanation = `The redirection to the dashboard failed or occurred slowly. Verifying the URL path is the safest way to await the redirection before performing actions.`;
                } else if (data.message.includes('click')) {
                    proposedFixCode = `cy.get('button[type="submit"]').click({ force: true });`;
                    explanation = `The button could be covered by another element, or disabled. Forcing the click or verifying its interactable state is recommended.`;
                }

                aiPanel.innerHTML = `
                    <div class="ai-header">
                        <span class="ai-avatar">🤖</span>
                        <span class="ai-title">CyPilot AI Analysis</span>
                    </div>
                    <div class="ai-explanation">
                        ${explanation}
                    </div>
                    <div class="fix-code-block">
                        <div class="fix-code-header">
                            <span>PROPOSED FIX</span>
                            <span style="font-family: monospace;">js</span>
                        </div>
                        <pre class="fix-code-content" id="fix-code">${proposedFixCode}</pre>
                    </div>
                    <button class="btn-primary" id="apply-fix-btn">
                        <span>✨ Apply AI Fix</span>
                    </button>
                `;

                container.appendChild(aiPanel);

                // Add button listener to post back to VS Code
                document.getElementById('apply-fix-btn').addEventListener('click', () => {
                    const code = document.getElementById('fix-code').innerText;
                    vscode.postMessage({
                        type: 'applyFix',
                        code: code
                    });
                });
            }
        }
    </script>
</body>
</html>
