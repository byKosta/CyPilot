<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#161b30" />
    </linearGradient>
    <!-- Cypress Teal/Green Gradient -->
    <linearGradient id="cyGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#09b3af" />
      <stop offset="100%" stop-color="#2af598" />
    </linearGradient>
    <!-- AI Indigo/Purple Gradient -->
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Card -->
  <rect width="128" height="128" rx="30" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  
  <!-- Outer details -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="rgba(9, 179, 175, 0.04)" stroke-width="3" stroke-dasharray="8 12" />
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(99, 102, 241, 0.02)" stroke-width="1.5" />

  <!-- Cypress Styled "C" -->
  <path d="M 72,30 
           A 34,34 0 1,0 72,98 
           A 34,34 0 0,0 93,87
           L 82,76
           A 19,19 0 1,1 72,46
           A 19,19 0 0,1 82,52
           L 93,41
           A 34,34 0 0,0 72,30 Z" 
        fill="url(#cyGrad)" 
        filter="url(#glowTeal)" />

  <!-- AI Pilot Spark (Large star) -->
  <path d="M 88,52 
           Q 88,40 76,40 
           Q 88,40 88,28 
           Q 88,40 100,40 
           Q 88,40 88,52 Z" 
        fill="url(#aiGrad)" 
        filter="url(#glowPurple)" 
        transform="translate(8, 22) scale(0.65)" />

  <!-- AI Pilot Spark (Small star) -->
  <path d="M 88,52 
           Q 88,44 80,44 
           Q 88,44 88,36 
           Q 88,44 96,44 
           Q 88,44 88,52 Z" 
        fill="#ffffff" 
        transform="translate(-4, 52) scale(0.4)" />
</svg>
